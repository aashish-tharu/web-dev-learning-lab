<html>
    <head>
        <title>Today's weather</title>
         <link rel="icon" type="image.jpg" href="media/icon.png">
         <link rel="stylesheet" href="stylesheet.css">
    </head>
    <body>
        <div class="parent">
            <div class="container">
                <div class="search">
                    <img src="media/search.webp" alt="">
                    <input type="text" placeholder="Search Here" id="cityInput">
                </div>

                <div class="content1">
                    <img src="media/cloud.png" alt="">
                    <div class="details">
                        <h3 id="condition">Rain Showers</h3>
                        <h1 id="temperature">18°C</h1>
                        <h6 id="date">Thursday 20 April 2025</h6>
                    </div>
                </div>

                <div class="content2">
                    <div class="part">
                        <div class="airquality">
                                <h4 id="airQuality">136</h4>
                                <h6>Air Quality</h6>
                                <img src="media/wind.gif" alt="">
                        </div>
                    </div>
                    <div class="part">
                        <div class="airquality">
                            <h4 id="pressure">136</h4>
                            <h6>Pressure</h6>
                            <img src="media/pressure.gif" alt="">
                        </div>
                    </div>
                    <div class="part">
                        <div class="airquality">
                            <h4 id="uv">136</h4>
                            <h6>UV</h6>
                            <img src="media/uv-radiation.gif" alt="">
                        </div>
                    </div>
                    <div class="part">
                        <div class="airquality">
                            <h4 id="precipitation">136</h4>
                            <h6>Precipitation</h6>
                            <img src="media/precipitation.png" alt="">
                        </div>
                    </div>
                    <div class="part">
                        <div class="airquality">
                            <h4 id="wind">136</h4>
                            <h6>wind</h6>
                            <img src="media/wind-turbine.gif" alt="">
                        </div>
                    </div>
                    <div class="part">
                        <div class="airquality">
                            <h4 id="visibility">136</h4>
                            <h6>Visibility</h6>
                            <img src="media/watching.gif" alt="">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
